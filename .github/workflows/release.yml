name: Release MS-DOS build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Open Watcom
        uses: open-watcom/setup-watcom@v1
        with:
          version: "2.0"
          target: "dos"

      - name: Extract release notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $text = Get-Content CHANGELOG.md -Raw
          $pattern = "(?ms)^##\s+$([regex]::Escape($tag))\s+-\s+[^\r\n]+\r?\n(?<body>.*?)(?=^##\s+v|\z)"
          $match = [regex]::Match($text, $pattern)
          if (-not $match.Success -or [string]::IsNullOrWhiteSpace($match.Groups['body'].Value)) {
            Write-Error "CHANGELOG.md is missing a non-empty section for $tag. Add '## $tag - YYYY-MM-DD' before tagging."
            exit 1
          }
          New-Item -ItemType Directory -Force release | Out-Null
          $body = "# $tag`n`n" + $match.Groups['body'].Value.Trim() + "`n"
          Set-Content -LiteralPath release\RELEASE_NOTES.md -Value $body -Encoding UTF8

      - name: Build executable
        shell: pwsh
        run: |
          python tools\music\build_music.py
          if ((Get-Item dist\AYRIEN.SND).Length -gt 512KB) { throw "AYRIEN.SND exceeds 512 KB" }
          wmake -f build\wmakefile
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item AYRIEN.EXE release\AYRIEN.EXE
          Copy-Item dist\AYRIEN.SND release\AYRIEN.SND
          Copy-Item dist\README.TXT release\README.TXT
          python build\mkfloppy.py release\AYRIEN.IMG release\AYRIEN.EXE release\AYRIEN.SND release\README.TXT
          Compress-Archive -Path release\AYRIEN.EXE,release\AYRIEN.SND,release\AYRIEN.IMG,release\README.TXT -DestinationPath release\Ayrien-Assault-MS-DOS.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: Ayrien-Assault-MS-DOS
          path: |
            release/AYRIEN.EXE
            release/AYRIEN.SND
            release/AYRIEN.IMG
            release/README.TXT
            release/Ayrien-Assault-MS-DOS.zip
            release/RELEASE_NOTES.md

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          body_path: release/RELEASE_NOTES.md
          files: |
            release/AYRIEN.EXE
            release/AYRIEN.SND
            release/AYRIEN.IMG
            release/README.TXT
            release/Ayrien-Assault-MS-DOS.zip
